version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: geosample_db
    environment:
      - POSTGRES_DB=geosample
      - POSTGRES_USER=geo_user
      - POSTGRES_PASSWORD=geo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data: